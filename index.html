<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظرسنجی اهداف و استراتژی</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 id="survey-title">نظرسنجی اهداف و استراتژی</h1>
      <p id="survey-subtitle">نظر شما درباره مهم‌ترین اهداف و راهبردهای دستیابی به آن‌ها</p>
    </header>

    <div id="survey-banner-wrap" class="survey-banner-wrap hidden">
      <img id="survey-banner" class="survey-banner" alt="تصویر نظرسنجی">
    </div>

    <div id="survey-description-wrap" class="survey-description-wrap hidden">
      <p id="survey-description" class="survey-description"></p>
    </div>

    <div id="alert-box"></div>
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>در حال بارگذاری سوالات...</p>
    </div>

    <form id="survey-form" class="hidden">
      <div id="questions-container"></div>
      <button type="submit" class="btn btn-primary btn-block">ثبت نظرات</button>
    </form>

    <div id="thank-you" class="card hidden" style="text-align:center">
      <h2>متشکریم!</h2>
      <p style="color:var(--text-muted);margin-top:0.5rem">نظرات شما با موفقیت ثبت شد.</p>
    </div>

    <div id="already-submitted" class="card hidden" style="text-align:center">
      <h2>قبلاً شرکت کرده‌اید</h2>
      <p style="color:var(--text-muted);margin-top:0.5rem">هر دستگاه فقط یک‌بار می‌تواند در این پرسشنامه شرکت کند.</p>
    </div>
  </div>

  <footer class="site-footer">
    <div class="company-branding company-branding--footer">
      <p class="company-label">هلدینگ پیشران انتخاب</p>
      <p class="company-subtitle">معاونت برنامه ریزی جامع</p>
      <img src="assets/logo.png" alt="هلدینگ پیشران انتخاب" class="company-logo" onerror="this.style.display='none'">
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/app.js"></script>
  <script>
    const form = document.getElementById('survey-form');
    const loading = document.getElementById('loading');
    const thankYou = document.getElementById('thank-you');
    const questionsContainer = document.getElementById('questions-container');
    const alertBox = document.getElementById('alert-box');
    let currentSurveyId = null;

    async function init() {
      try {
        const client = getSupabaseClient();
        const surveyId = getSurveyIdFromUrl();
        currentSurveyId = surveyId;

        if (!surveyId) {
          loading.classList.add('hidden');
          showAlert(alertBox, 'لینک پرسشنامه معتبر نیست. از QR Code یا لینک صحیح استفاده کنید.', 'error');
          return;
        }

        const survey = await fetchSurvey(client, surveyId);
        if (!survey) {
          loading.classList.add('hidden');
          showAlert(alertBox, 'پرسشنامه یافت نشد.', 'error');
          return;
        }

        if (!survey.active) {
          loading.classList.add('hidden');
          showAlert(alertBox, 'این پرسشنامه در حال حاضر غیرفعال است.', 'error');
          return;
        }

        applySurveyHeader(survey);

        const deviceId = getDeviceId();
        if (await hasDeviceCompletedSurvey(client, surveyId, deviceId)) {
          loading.classList.add('hidden');
          showAlreadySubmitted();
          return;
        }

        const questions = await fetchActiveQuestions(client, surveyId);

        loading.classList.add('hidden');

        if (questions.length === 0) {
          questionsContainer.innerHTML = '<div class="alert alert-info">هنوز سوالی تعریف نشده. از پنل مدیریت سوالات را اضافه کنید.</div>';
          form.classList.remove('hidden');
          return;
        }

        questions.forEach((q, i) => {
          const div = document.createElement('div');
          div.className = 'card';
          div.innerHTML = renderQuestionInput(q, i);
          questionsContainer.appendChild(div);
        });

        form.classList.remove('hidden');
      } catch (err) {
        loading.classList.add('hidden');
        showAlert(alertBox, err.message, 'error');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'در حال ثبت...';

      try {
        const client = getSupabaseClient();
        const entries = collectSurveyAnswers(form);

        if (entries.length === 0) {
          showAlert(alertBox, 'لطفاً حداقل به یک سوال پاسخ دهید.', 'error');
          btn.disabled = false;
          btn.textContent = 'ثبت نظرات';
          return;
        }

        await submitSurveyResponses(client, currentSurveyId, entries);
        showThankYou();
      } catch (err) {
        if (err.message === 'ALREADY_COMPLETED') {
          showAlreadySubmitted();
          return;
        }
        showAlert(alertBox, 'خطا در ثبت: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'ثبت نظرات';
      }
    });

    init();
  </script>
</body>
</html>
