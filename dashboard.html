<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>داشبورد ابر واژگان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container-wide">
    <header>
      <h1>داشبورد نتایج</h1>
      <p>نمایش ابر واژگان از نظرات شرکت‌کنندگان</p>
      <nav class="nav-links">
        <a href="index.html">نظرسنجی</a>
        <a href="admin.html">مدیریت</a>
      </nav>
    </header>

    <div id="alert-box"></div>

    <div id="login-section" class="card">
      <h2>ورود مدیر</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="password">رمز عبور</label>
          <input type="password" id="password" required placeholder="رمز عبور را وارد کنید">
        </div>
        <button type="submit" class="btn btn-primary btn-block">ورود</button>
      </form>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>در حال بارگذاری داده‌ها...</p>
    </div>

    <div id="dashboard" class="hidden">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="stat-responses">0</div>
          <div class="stat-label">تعداد پاسخ</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-words">0</div>
          <div class="stat-label">عبارت و واژه</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-questions">0</div>
          <div class="stat-label">سوالات فعال</div>
        </div>
      </div>

      <div class="export-bar">
        <button id="export-cloud-btn" class="btn btn-primary btn-sm">دانلود ابر واژگان (PNG)</button>
        <button id="export-words-btn" class="btn btn-secondary btn-sm">دانلود لیست واژگان (CSV)</button>
        <button id="export-results-btn" class="btn btn-secondary btn-sm">دانلود نتایج (CSV)</button>
        <button id="export-json-btn" class="btn btn-secondary btn-sm">دانلود نتایج (JSON)</button>
      </div>

      <div class="filter-bar">
        <label for="question-filter">فیلتر بر اساس سوال:</label>
        <select id="question-filter">
          <option value="all">همه سوالات</option>
        </select>
        <button id="refresh-btn" class="btn btn-secondary btn-sm">بروزرسانی</button>
      </div>

      <div class="card wordcloud-card">
        <h2>ابر واژگان</h2>
        <div class="wordcloud-canvas-wrap">
          <canvas id="wordcloud-canvas"></canvas>
        </div>
        <p id="no-data" class="hidden" style="color:var(--text-muted);padding:2rem">هنوز پاسخی ثبت نشده است.</p>
      </div>

      <div class="card">
        <h2>پرتکرارترین عبارات و واژه‌ها</h2>
        <div id="top-words"></div>
      </div>

      <div class="card">
        <h2>آخرین پاسخ‌ها</h2>
        <div id="recent-responses"></div>
      </div>

      <button id="logout-btn" class="btn btn-secondary" style="margin-top:1rem">خروج</button>
    </div>
  </div>

  <footer class="site-footer">
    <div class="company-branding company-branding--footer">
      <p class="company-label">هلدینگ پیشران انتخاب</p>
      <p class="company-subtitle">معاونت برنامه ریزی جامع</p>
      <img src="assets/logo.png" alt="هلدینگ پیشران انتخاب" class="company-logo" onerror="this.style.display='none'">
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.js"></script>
  <script src="config.js"></script>
  <script src="js/app.js"></script>
  <script>
    const loading = document.getElementById('loading');
    const loginSection = document.getElementById('login-section');
    const dashboard = document.getElementById('dashboard');
    const alertBox = document.getElementById('alert-box');
    const questionFilter = document.getElementById('question-filter');
    let allResponses = [];
    let allQuestions = [];
    let currentWordList = [];
    let client;

    const COLORS = ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#14b8a6'];

    function isLoggedIn() {
      return sessionStorage.getItem('admin_logged_in') === 'true';
    }

    function showDashboard() {
      loginSection.classList.add('hidden');
      dashboard.classList.remove('hidden');
      init();
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const pwd = document.getElementById('password').value;
      if (pwd === window.APP_CONFIG.adminPassword) {
        sessionStorage.setItem('admin_logged_in', 'true');
        showDashboard();
      } else {
        showAlert(alertBox, 'رمز عبور اشتباه است.', 'error');
      }
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.removeItem('admin_logged_in');
      dashboard.classList.add('hidden');
      loginSection.classList.remove('hidden');
      document.getElementById('password').value = '';
    });

    async function init() {
      loading.classList.remove('hidden');
      try {
        client = getSupabaseClient();
        allQuestions = await fetchActiveQuestions(client);
        allResponses = await fetchResponses(client);

        loading.classList.add('hidden');
        dashboard.classList.remove('hidden');

        allQuestions.forEach((q) => {
          const opt = document.createElement('option');
          opt.value = q.id;
          opt.textContent = q.text.length > 50 ? q.text.slice(0, 50) + '...' : q.text;
          questionFilter.appendChild(opt);
        });

        document.getElementById('stat-questions').textContent = allQuestions.length;
        render();
      } catch (err) {
        loading.classList.add('hidden');
        showAlert(alertBox, err.message, 'error');
      }
    }

    function getFilteredResponses() {
      const qId = questionFilter.value;
      if (qId === 'all') return allResponses;
      return allResponses.filter((r) => r.question_id === qId);
    }

    function render() {
      const responses = getFilteredResponses();
      const texts = responses.map((r) => r.answer);
      const wordList = tokenizeForWordCloud(texts);
      currentWordList = wordList;

      document.getElementById('stat-responses').textContent = responses.length;
      document.getElementById('stat-words').textContent = wordList.length;

      const canvas = document.getElementById('wordcloud-canvas');
      const noData = document.getElementById('no-data');

      if (wordList.length === 0) {
        canvas.classList.add('hidden');
        noData.classList.remove('hidden');
      } else {
        canvas.classList.remove('hidden');
        noData.classList.add('hidden');

        const w = Math.min(window.innerWidth - 80, 900);
        const longest = Math.max(...wordList.map(([term]) => term.length), 4);
        const gridSize = longest > 12 ? 4 : longest > 8 ? 5 : 6;
        const h = Math.max(420, Math.min(600, 280 + wordList.length * 6));
        canvas.width = w;
        canvas.height = h;
        canvas.style.width = `${w}px`;
        canvas.style.height = `${h}px`;

        WordCloud(canvas, {
          list: wordList,
          gridSize,
          weightFactor: (size) => Math.pow(size, 0.65) * 14,
          fontFamily: 'Vazirmatn, Tahoma, sans-serif',
          color: () => COLORS[Math.floor(Math.random() * COLORS.length)],
          rotateRatio: 0,
          shrinkToFit: true,
          backgroundColor: 'transparent',
          minSize: 12,
        });
      }

      const topWords = document.getElementById('top-words');
      topWords.innerHTML = wordList.slice(0, 20).map(([word, count], i) => `
        <div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border)">
          <span><strong>${i + 1}.</strong> ${word}</span>
          <span style="color:var(--accent);font-weight:600">${count}</span>
        </div>
      `).join('') || '<p style="color:var(--text-muted)">داده‌ای وجود ندارد.</p>';

      const recent = document.getElementById('recent-responses');
      recent.innerHTML = responses.slice(0, 10).map((r) => `
        <div style="padding:0.75rem 0;border-bottom:1px solid var(--border)">
          <small style="color:var(--text-muted)">${r.questions?.text || ''}</small>
          <p style="margin-top:0.25rem">${r.answer}</p>
        </div>
      `).join('') || '<p style="color:var(--text-muted)">پاسخی ثبت نشده.</p>';
    }

    questionFilter.addEventListener('change', render);
    document.getElementById('refresh-btn').addEventListener('click', async () => {
      allResponses = await fetchResponses(client);
      render();
      showAlert(alertBox, 'داده‌ها بروزرسانی شد.', 'success');
    });

    document.getElementById('export-cloud-btn').addEventListener('click', () => {
      const canvas = document.getElementById('wordcloud-canvas');
      if (canvas.classList.contains('hidden') || currentWordList.length === 0) {
        showAlert(alertBox, 'ابری برای ذخیره وجود ندارد.', 'error');
        return;
      }
      exportWordCloudPNG(canvas);
      showAlert(alertBox, 'ابر واژگان ذخیره شد.', 'success');
    });

    document.getElementById('export-words-btn').addEventListener('click', () => {
      if (currentWordList.length === 0) {
        showAlert(alertBox, 'لیست واژگان خالی است.', 'error');
        return;
      }
      exportWordListCSV(currentWordList);
      showAlert(alertBox, 'لیست واژگان ذخیره شد.', 'success');
    });

    document.getElementById('export-results-btn').addEventListener('click', () => {
      const responses = getFilteredResponses();
      if (responses.length === 0) {
        showAlert(alertBox, 'پاسخی برای ذخیره وجود ندارد.', 'error');
        return;
      }
      exportResponsesCSV(responses);
      showAlert(alertBox, 'نتایج ذخیره شد.', 'success');
    });

    document.getElementById('export-json-btn').addEventListener('click', () => {
      const responses = getFilteredResponses();
      if (responses.length === 0) {
        showAlert(alertBox, 'پاسخی برای ذخیره وجود ندارد.', 'error');
        return;
      }
      exportResponsesJSON(responses);
      showAlert(alertBox, 'فایل JSON ذخیره شد.', 'success');
    });

    if (isLoggedIn()) showDashboard();
  </script>
</body>
</html>
